<!DOCTYPE html>
<html lang="en">
  <head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080808; overflow-x: hidden; }

  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    background: #ffffff;
    border-radius: 50%;
    animation: twinkle linear infinite;
  }

  @keyframes twinkle {
    0%   { opacity: 0; transform: scale(0.5); }
    50%  { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.5); }
  }

  @keyframes shootingStar {
    0%   { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 1; width: 3px; }
    100% { transform: translateX(300px) translateY(300px) rotate(-45deg); opacity: 0; width: 80px; }
  }

  .shooting-star {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, #ffffff, transparent);
    border-radius: 999px;
    animation: shootingStar 3s linear infinite;
    opacity: 0;
  }

  @keyframes nebula {
    0%   { transform: scale(1) rotate(0deg);   opacity: 0.4; }
    50%  { transform: scale(1.1) rotate(180deg); opacity: 0.6; }
    100% { transform: scale(1) rotate(360deg); opacity: 0.4; }
  }
</style>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>🦉 DevNest</title>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
